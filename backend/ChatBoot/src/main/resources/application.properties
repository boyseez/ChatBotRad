spring.application.name=ChatBoot
server.port=${SERVER_PORT:8082}
springdoc.swagger-ui.enabled=true
#spring.main.banner-mode=off

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://admin:changeme@localhost:27017/chatboot?authSource=admin}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:chatboot}

# Keycloak / OAuth2 Resource Server Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8888/realms/ChatBot}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://keycloak:8080/realms/ChatBot/protocol/openid-connect/certs}

# OAuth2 Client Configuration (BFF Pattern)
spring.security.oauth2.client.registration.keycloak.client-id=${KC_CLIENT_ID:chatbot-backend}
spring.security.oauth2.client.registration.keycloak.client-secret=${KC_CLIENT_SECRET:chatbot-backend-secret-12345}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email,roles
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/keycloak
spring.security.oauth2.client.provider.keycloak.issuer-uri=${JWT_ISSUER_URI:http://localhost:8888/realms/ChatBot}
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# Keycloak Token Configuration (Chiamata interna Docker)
keycloak.token.uri=${KC_TOKEN_URI:http://keycloak:8080/realms/ChatBot/protocol/openid-connect/token}
keycloak.client.id=${KC_CLIENT_ID:chatbot-backend}
keycloak.client.secret=${KC_CLIENT_SECRET:chatbot-backend-secret-12345}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.it.peoplefirs.chatboot=DEBUG
