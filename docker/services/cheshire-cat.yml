services:
  cheshire-cat:
    image: ghcr.io/cheshire-cat-ai/core:latest
    container_name: cbr_core
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "1337:80"        # ← era 1337:1337, il container ascolta sulla 80
    volumes:
      - ../volume/cbr_storage/cat_metadata:/app/cat/data
      - ../volume/cbr_storage/cat_custom:/app/cat/plugins
    environment:
      - CORE_HOST=0.0.0.0
      - CORE_PORT=1337
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    networks:
      - cbr_network