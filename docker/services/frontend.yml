services:
  frontend:
    build:
      context: ../../frontend/ChatBotRad
      dockerfile: Dockerfile
    container_name: cbr_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_CAT_URL=http://localhost:1337
    networks:
      - cbr_network
    volumes:
      - ../../frontend/ChatBotRad:/app
      - /app/node_modules