services:
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.dev
    container_name: cbr_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    networks:
      - cbr_network
    environment:
      - VITE_LOG_LEVEL=trace
      - VITE_LOG_ENABLED=true
    command: sh -c "npm install && npm run dev"
    # niente depends_on, parte subito
